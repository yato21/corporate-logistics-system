services:
  server:
    build: ./server
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=${PORT}
      - CLIENT_URL=${CLIENT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - app-network
    user: "1000:1000"

  client:
    build: ./client
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=${API_URL}
      - REACT_APP_SOCKET_URL=${SOCKET_URL}
    networks:
      - app-network
    user: "1000:1000"
  postgres:
    image: postgres:14-alpine
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    user: "1000:1000"
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - client
      - server
    networks:
      - app-network
    user: "1000:1000"
networks:
  app-network:
    driver: bridge

volumes:
  postgres-data: 