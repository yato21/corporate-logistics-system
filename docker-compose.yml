version: '3.8'

services:
  # Nginx для проксирования запросов
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/build:/usr/share/nginx/html
    depends_on:
      - client
      - server
    environment:
      - DOMAIN=${DOMAIN}
    restart: always

  # Клиентская часть (React)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      - REACT_APP_API_URL=http://${DOMAIN}/api
      - REACT_APP_SOCKET_URL=http://${DOMAIN}
    volumes:
      - client_build:/app/build

  # Серверная часть (Node.js)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - CLIENT_URL=http://${DOMAIN}
      - PORT=${SERVER_PORT}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV}
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      - postgres
    restart: always

  # База данных PostgreSQL
  postgres:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
  server_uploads:
  client_build: 